<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính chỉ số BMI</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.5rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 1rem;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Tính BMI</h2>
        <div class="input-group">
            <label>Chiều cao (cm):</label>
            <input type="number" id="height" placeholder="VD: 170">
        </div>
        <div class="input-group">
            <label>Cân nặng (kg):</label>
            <input type="number" id="weight" placeholder="VD: 65">
        </div>
        <button onclick="calculateBMI()">Tính</button>
        <p id="result"></p>
    </div>

    <script>
        function calculateBMI() {
            // Lấy giá trị từ ô nhập
            const height = document.getElementById('height').value / 100; // Đổi cm sang m
            const weight = document.getElementById('weight').value;
            const resultElement = document.getElementById('result');

            if (height > 0 && weight > 0) {
                // Công thức BMI = cân nặng / (chiều cao * chiều cao)
                const bmi = (weight / (height * height)).toFixed(1);

                let message = "";
                if (bmi < 18.5) message = "Gầy";
                else if (bmi < 24.9) message = "Bình thường";
                else if (bmi < 29.9) message = "Thừa cân";
                else message = "Béo phì";

                resultElement.innerHTML = `BMI của bạn là: ${bmi} (${message})`;
            } else {
                resultElement.innerHTML = "Vui lòng nhập số hợp lệ";
            }
        }
    </script>
</body>

</html>
